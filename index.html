<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HerbtDash</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#020617;
}

header h2 {
  color:#22c55e;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
  animation:fadeIn 1s ease;
}

.hero h1 {
  font-size:42px;
}

/* BOTONES */
.btn {
  background:#22c55e;
  padding:14px 25px;
  border-radius:10px;
  text-decoration:none;
  color:black;
  margin:10px;
  display:inline-block;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.1);
  background:#16a34a;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

/* TARJETAS */
.card {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  transition:0.3s;
  animation:fadeIn 1s ease;
}

.card:hover {
  transform:translateY(-10px);
}

/* SECCIONES */
.section {
  text-align:center;
  padding:60px 20px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:15px;
  border-radius:50%;
  animation:fadeIn 1s ease;
}
</style>
</head>

<body>

<header>
  <h2>HerbtDash</h2>
</header>

<div class="hero">
  <h1>Envíos rápidos ⚡ y seguros</h1>
  <p>Tu courier moderno en la ciudad</p>

  <a class="btn" href="https://wa.me/51936781369?text=Hola quiero un envio">WhatsApp</a>

  <a class="btn" href="tel:+51936781369">Llamar</a>

  <a class="btn" href="https://maps.google.com" target="_blank">Ubicación</a>
</div>

<div class="section">
  <h2>Servicios</h2>
</div>

<div class="grid">
  <div class="card">
    🚚 Envíos express
  </div>
  <div class="card">
    📍 Seguimiento
  </div>
  <div class="card">
    🔒 Seguridad
  </div>
</div>

<div class="section">
  <h2>Cómo funciona</h2>
</div>

<div class="grid">
  <div class="card">1️⃣ Solicitas</div>
  <div class="card">2️⃣ Recogemos</div>
  <div class="card">3️⃣ Entregamos</div>
</div>

<div class="section">
  <h2>Solicitar envío</h2>

  <a class="btn" href="https://wa.me/51936781369?text=Hola quiero un envio urgente">
    Solicitar ahora
  </a>
</div>

<a class="whatsapp" href="https://wa.me/51936781369?text=Hola quiero un envio">
💬
</a>

</body>
</html>
