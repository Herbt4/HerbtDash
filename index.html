<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HerbtDash</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#020617;
}

header h2 {
  color:#22c55e;
}

nav a {
  margin:0 10px;
  text-decoration:none;
  color:white;
}

.hero {
  text-align:center;
  padding:80px 20px;
}

.btn {
  background:#22c55e;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  color:black;
  margin:10px;
  display:inline-block;
}

.section {
  padding:60px 20px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:15px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>
  <h2>HerbtDash</h2>
  <nav>
    <a href="#inicio">Inicio</a>
    <a href="#servicios">Servicios</a>
    <a href="#como">Cómo funciona</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<section id="inicio" class="hero">
  <h1>Envíos rápidos y seguros</h1>
  <p>Entrega el mismo día en tu ciudad</p>

  <a class="btn" href="https://wa.me/51936781369?text=Hola quiero un envio">
    Pedir envío
  </a>

  <a class="btn" href="#servicios">
    Ver servicios
  </a>
</section>

<section id="servicios" class="section">
  <h2>Servicios</h2>
  <div class="grid">
    <div class="card">🚚 Envíos express</div>
    <div class="card">📍 Seguimiento</div>
    <div class="card">🔒 Seguridad</div>
  </div>
</section>

<section id="como" class="section">
  <h2>Cómo funciona</h2>
  <div class="grid">
    <div class="card">1️⃣ Solicitas</div>
    <div class="card">2️⃣ Recogemos</div>
    <div class="card">3️⃣ Entregamos</div>
  </div>
</section>

<section id="contacto" class="section">
  <h2>Contacto</h2>

  <a class="btn" href="https://wa.me/51936781369?text=Hola quiero un envio">
    Escribir por WhatsApp
  </a>
</section>

<a class="whatsapp" href="https://wa.me/51936781369?text=Hola quiero un envio">
💬
</a>

</body>
</html>
